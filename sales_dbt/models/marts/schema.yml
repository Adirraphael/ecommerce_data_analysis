version: 2                                      
                                                  
models:                                         
    - name: fct_orders                            
      columns:                                    
        - name: order_id
          tests:
            - unique
            - not_null
        - name: customer_id
          tests:
            - not_null
        - name: status                            
          tests:
            - accepted_values:                    
                values: ['completed', 'shipped',
  'processing', 'cancelled', 'refunded']          
  
    - name: fct_order_items                       
      columns:    
        - name: order_item_id
          tests:
            - unique
            - not_null
        - name: order_id
          tests:
            - not_null
        - name: product_id                        
          tests:
            - not_null                            
                  
    - name: dim_customers
      columns:
        - name: customer_id
          tests:
            - unique
            - not_null
                                                  
    - name: dim_products
      columns:                                    
        - name: product_id
          tests:
            - unique
            - not_null